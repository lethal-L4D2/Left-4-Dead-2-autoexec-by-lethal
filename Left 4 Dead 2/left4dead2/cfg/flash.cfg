//makro na latarke
alias r_flushR r_flush1
alias r_flush1 "impulse 100;wait 5; r_flush2"
alias r_flush2 "impulse 100;wait 5; r_flushR"
alias "+r_flush" "alias r_flushR r_flush1; r_flushR"
alias "-r_flush" "alias r_flushR"
alias "t_flush" "t_flush1"
alias "t_flush1" "+r_flush; alias t_flush t_flush2"
alias "t_flush2" "-r_flush; alias t_flush t_flush1"

alias r_huntS r_hunt1
alias r_hunt1 "+attack; wait 3; -attack;wait 5; r_hunt2"
alias r_hunt2 "+attack; wait 3; -attack;wait 5; r_huntS"
alias "+r_hunt" "alias r_huntS r_hunt1; r_huntS"
alias "-r_hunt" "alias r_huntS"
alias "t_hunt" "t_hunt1"
alias "t_hunt1" "+r_hunt; alias t_hunt t_hunt2"
alias "t_hunt2" "-r_hunt; alias t_hunt t_hunt1"

alias r_fireS r_fire1
alias r_fire1 "+attack; wait 3; -attack;wait 5; r_fire2"
alias r_fire2 "+attack; wait 3; -attack;wait 5; r_fire3"
alias r_fire3 "+attack; wait 3; -attack;wait 5; r_fire4"
alias r_fire4 "+attack; wait 3; -attack;wait 5; r_fire5"
alias r_fire5 "+attack; wait 3; -attack;wait 5; r_fire6"
alias r_fire6 "+attack; wait 3; -attack;wait 5; r_fire7"
alias r_fire7 "+attack; wait 3; -attack;wait 5; r_fire8"
alias r_fire8 "+attack; wait 3; -attack;wait 5; r_fireS"
alias "+r_fire" "alias r_fireS r_fire1; r_fireS"
alias "-r_fire" "alias r_fireS"
alias "t_fire" "t_fire1"
alias "t_fire1" "+r_fire; alias t_fire t_fire2"
alias "t_fire2" "-r_fire; alias t_fire t_fire1"


